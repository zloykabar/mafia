<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мафия Онлайн | Многопользовательская игра</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #0a1a1f 0%, #071217 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(0,0,0,0.55);
            border-radius: 2rem;
            padding: 1.5rem;
        }
        .join-screen {
            text-align: center;
            padding: 40px;
        }
        input, button {
            padding: 12px 24px;
            margin: 10px;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        input {
            background: #1f2e2c;
            color: white;
            border: 1px solid #c9a03d;
        }
        button {
            background: #b8860b;
            color: white;
            transition: 0.2s;
        }
        button:active { transform: scale(0.96); }
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }
        .player-card {
            background: #1e2e2a;
            border-radius: 1.5rem;
            padding: 1rem;
            border-left: 5px solid #ffb347;
            cursor: pointer;
        }
        .player-card.selected { background: #2c423a; transform: scale(1.02); }
        .role-mafia { color: #ff8a7a; }
        .role-sheriff { color: #7ec8ff; }
        .dead { opacity: 0.5; text-decoration: line-through; }
        .phase-badge {
            background: #000000aa;
            padding: 10px;
            border-radius: 3rem;
            text-align: center;
            font-size: 1.5rem;
            margin: 1rem 0;
        }
        .log {
            background: #030c0ed9;
            border-radius: 1.5rem;
            padding: 1rem;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            margin-top: 1rem;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div id="joinScreen" class="join-screen">
        <h1>🃏 МАФИЯ ОНЛАЙН</h1>
        <input type="text" id="playerName" placeholder="Ваше имя" maxlength="20">
        <br>
        <input type="text" id="roomId" placeholder="ID комнаты">
        <br>
        <button onclick="createRoom()">➕ Создать комнату</button>
        <button onclick="joinRoom()">🚪 Подключиться</button>
    </div>
    
    <div id="gameScreen" class="hidden">
        <div class="phase-badge" id="phaseDisplay">Лобби</div>
        <div class="players-grid" id="playersGrid"></div>
        <div id="actionPanel" style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;"></div>
        <div class="log" id="logArea"></div>
        <button onclick="copyLink()">📋 Скопировать ссылку для друзей</button>
        <button onclick="leaveGame()">🚪 Выйти из игры</button>
    </div>
</div>

<script>
    const socket = io();
    let currentRoom = null;
    let myId = null;
    let players = [];
    let phase = 'lobby';
    let selectedPlayerId = null;
    let gameActive = false;
    let myRole = null;
    
    function addLog(msg) {
        const logDiv = document.getElementById('logArea');
        const time = new Date().toLocaleTimeString().slice(0,5);
        logDiv.innerHTML = `🕒 ${time} ${msg}<br>${logDiv.innerHTML}`;
        if(logDiv.children.length > 20) logDiv.lastChild?.remove();
    }
    
    function createRoom() {
        const name = document.getElementById('playerName').value.trim();
        if(!name) return alert('Введите имя');
        const roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
        socket.emit('createRoom', { roomId, playerName: name });
        currentRoom = roomId;
        document.getElementById('joinScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.remove('hidden');
        addLog(`✅ Комната создана: ${roomId}. Отправьте ссылку друзьям!`);
    }
    
    function joinRoom() {
        const name = document.getElementById('playerName').value.trim();
        let roomId = document.getElementById('roomId').value.trim().toUpperCase();
        if(!name || !roomId) return alert('Введите имя и ID комнаты');
        socket.emit('joinRoom', { roomId, playerName: name });
        currentRoom = roomId;
        document.getElementById('joinScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.remove('hidden');
    }
    
    function copyLink() {
        const url = `${window.location.href}?room=${currentRoom}`;
        navigator.clipboard.writeText(url);
        addLog('📋 Ссылка скопирована! Отправьте друзьям.');
    }
    
    function leaveGame() {
        location.reload();
    }
    
    socket.on('updatePlayers', (updatedPlayers) => {
        players = updatedPlayers;
        const me = players.find(p => p.id === socket.id);
        if(me) myRole = me.role;
        renderPlayers();
    });
    
    socket.on('roomCreated', ({ roomId }) => {
        addLog(`🎉 Комната ${roomId} создана! Ждём игроков (4-30). Когда все готовы, ведущий нажимает СТАРТ.`);
    });
    
    socket.on('gameStarted', ({ players: updatedPlayers, phase: newPhase }) => {
        players = updatedPlayers;
        phase = newPhase;
        gameActive = true;
        addLog('🌙 ИГРА НАЧАЛАСЬ! Наступает ночь...');
        renderPlayers();
        updateActionButtons();
    });
    
    socket.on('phaseChange', ({ phase: newPhase }) => {
        phase = newPhase;
        selectedPlayerId = null;
        document.getElementById('phaseDisplay').innerHTML = phase === 'night' ? '🌑 НОЧЬ' : '☀️ ДЕНЬ';
        addLog(phase === 'night' ? '🌙 Наступила ночь. Мафия, выберите жертву!' : '☀️ Наступил день! Голосуйте!');
        renderPlayers();
        updateActionButtons();
    });
    
    socket.on('log', (msg) => addLog(msg));
    
    socket.on('sheriffResult', ({ targetName, result }) => {
        addLog(`🔎 Шериф проверил ${targetName} — это ${result}`);
    });
    
    socket.on('gameOver', ({ winner }) => {
        addLog(`🏆 ИГРА ОКОНЧЕНА! ${winner}`);
        gameActive = false;
    });
    
    socket.on('error', (msg) => alert(msg));
    
    function renderPlayers() {
        const grid = document.getElementById('playersGrid');
        if(!grid) return;
        grid.innerHTML = '';
        players.forEach(p => {
            const card = document.createElement('div');
            card.className = `player-card ${selectedPlayerId === p.id ? 'selected' : ''} ${!p.isAlive ? 'dead' : ''}`;
            let roleText = '';
            if(!gameActive || !p.isAlive) {
                roleText = p.isRevealed ? (p.role === 'mafia' ? '🔪 Мафия' : p.role === 'sheriff' ? '👮 Шериф' : '👤 Мирный') : '???';
            } else if(p.id === socket.id && p.role) {
                roleText = p.role === 'mafia' ? '🔪 Вы - Мафия' : p.role === 'sheriff' ? '👮 Вы - Шериф' : '👤 Вы - Мирный';
            } else {
                roleText = '❓ Скрыто';
            }
            card.innerHTML = `
                <div><strong>${p.name}</strong> ${p.isAlive ? '🟢' : '⚰️'}</div>
                <div class="role-${p.role}">${roleText}</div>
            `;
            if(gameActive && p.isAlive && p.id !== socket.id) {
                card.onclick = () => { selectedPlayerId = p.id; renderPlayers(); updateActionButtons(); };
            }
            grid.appendChild(card);
        });
    }
    
    function updateActionButtons() {
        const panel = document.getElementById('actionPanel');
        if(!panel) return;
        panel.innerHTML = '';
        if(!gameActive) {
            const isHost = players[0]?.id === socket.id;
            if(isHost && players.length >= 4) {
                panel.innerHTML += `<button onclick="socket.emit('startGame', { roomId: '${currentRoom}' })">🎲 СТАРТ ИГРЫ</button>`;
            }
            return;
        }
        
        const me = players.find(p => p.id === socket.id);
        if(!me || !me.isAlive) return;
        
        if(phase === 'night') {
            if(me.role === 'mafia' && selectedPlayerId) {
                const target = players.find(p => p.id === selectedPlayerId);
                if(target?.isAlive && target.role !== 'mafia') {
                    panel.innerHTML += `<button onclick="socket.emit('nightAction', { roomId: '${currentRoom}', targetId: '${selectedPlayerId}', actionType: 'mafia' })">🔪 Убить выбранного</button>`;
                }
            }
            if(me.role === 'sheriff' && selectedPlayerId) {
                panel.innerHTML += `<button onclick="socket.emit('nightAction', { roomId: '${currentRoom}', targetId: '${selectedPlayerId}', actionType: 'sheriff' })">🕵️ Проверить выбранного</button>`;
            }
        } else if(phase === 'day') {
            if(selectedPlayerId) {
                panel.innerHTML += `<button onclick="socket.emit('dayVote', { roomId: '${currentRoom}', targetId: '${selectedPlayerId}' })">🗳️ Голосовать за выбранного</button>`;
            }
        }
    }
    
    // Автоматическое подключение по ссылке ?room=XXX
    const urlParams = new URLSearchParams(window.location.search);
    const roomFromUrl = urlParams.get('room');
    if(roomFromUrl) {
        document.getElementById('roomId').value = roomFromUrl;
        document.getElementById('playerName').value = `Игрок${Math.floor(Math.random()*100)}`;
    }
    
    renderPlayers();
</script>
</body>
</html>
